<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="grid-container">
        <div class="sidebar">
            <div class="title">
                <img src="./icons/view-dashboard.svg" alt="" width="65px">
                <h3>Dashboard</h3>
            </div>

            <div class="links">
                <div class="navigation">
                    <div>
                        <img src="./icons/home.svg" alt="Home" width="50px">
                        <a href="#">Home</a>
                    </div>

                    <div>
                        <img src="./icons/card-account-details-outline.svg" alt="Profile" width="50px">
                        <a href="#">Profile</a>
                    </div>

                    <div>
                        <img src="./icons/history.svg" alt="History" width="50px">
                        <a href="#">History</a>
                    </div>

                    <div>
                        <img src="./icons/note-multiple.svg" alt="Tasks" width="50px">
                        <a href="#">Tasks</a>
                    </div>

                    <div>
                        <img src="./icons/account-group.svg" alt="Communities" width="50px">
                        <a href="#">Communities</a>
                    </div>
                </div>

                <div class="branding">
                    <div>
                        <img src="./icons/cog.svg" alt="Settings" width="50px">
                        <a href="#">Settings</a>
                    </div>

                    <div>
                        <img src="./icons/help-box.svg" alt="Support" width="50px">
                        <a href="#">Support</a>
                    </div>

                    <div>
                        <img src="./icons/shield-check.svg" alt="Privacy" width="50px">
                        <a href="#">Privacy</a>
                    </div>
                </div>


            </div>

        </div>
    </div>

</body>

</html>
